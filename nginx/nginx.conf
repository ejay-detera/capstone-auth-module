server {
    listen 5173;

    resolver 127.0.0.11 valid=30s;

    # Auth module web interface at root
    location / {
        set $upstream_web http://web-interface:5000;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Auth API gateway
    location /api/ {
        set $auth_header $http_authorization;
        if ($cookie_access_token) {
            set $auth_header "Bearer $cookie_access_token";
        }
        proxy_set_header Authorization $auth_header;
        proxy_pass http://auth-service:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
    }

    # SERMS API gateway
    location /api/serms/ {
        set $auth_header $http_authorization;
        if ($cookie_access_token) {
            set $auth_header "Bearer $cookie_access_token";
        }
        proxy_set_header Authorization $auth_header;
        proxy_pass http://serms_api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
    }

    # CRMS frontend at /crms/
    location /crms/ {
        set $upstream_crms http://crms-web:5001;
        proxy_pass $upstream_crms;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SERMS frontend at /serms/
    location /serms/ {
        set $upstream_serms http://serms_web:5002;
        proxy_pass $upstream_serms;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}