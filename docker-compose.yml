services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8000:80"
    volumes:
      - ./auth-service:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=sail
      - DB_PASSWORD=password
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - capstone-network

  web-interface:
    build:
      context: ./web-interface
      dockerfile: Dockerfile
    container_name: web-interface
    ports:
      - "8080:80"
    depends_on:
      - auth-service
    networks:
      - capstone-network

  db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=sail
      - MYSQL_PASSWORD=password
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - capstone-network

  redis:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - capstone-network

networks:
  capstone-network:
    driver: bridge

volumes:
  mysql-data:
